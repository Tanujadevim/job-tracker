{% extends 'jobs/base.html' %}
{% block content %}

<div class="row justify-content-center mt-4">
  <div class="col-md-6">
    <div class="card shadow border-0 rounded-4">
      <div class="card-body p-5">
        <h4 class="fw-bold mb-4">{{ title }}</h4>
        <form method="POST">
          {% csrf_token %}

          <div class="mb-3">
            <label class="form-label fw-semibold" style="font-size:14px">Job Title</label>
            <input type="text" name="title" value="{{ form.title.value|default:'' }}"
              class="form-control rounded-3 {% if form.title.errors %}is-invalid{% endif %}"
              placeholder="e.g. Python Developer"
              style="padding: 10px 14px; font-size:14px">
            {% for error in form.title.errors %}
              <div class="invalid-feedback">{{ error }}</div>
            {% endfor %}
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold" style="font-size:14px">Company</label>
            <input type="text" name="company" value="{{ form.company.value|default:'' }}"
              class="form-control rounded-3 {% if form.company.errors %}is-invalid{% endif %}"
              placeholder="e.g. Google"
              style="padding: 10px 14px; font-size:14px">
            {% for error in form.company.errors %}
              <div class="invalid-feedback">{{ error }}</div>
            {% endfor %}
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold" style="font-size:14px">Status</label>
            <select name="status" class="form-select rounded-3" style="padding: 10px 14px; font-size:14px">
              <option value="applied" {% if form.status.value == 'applied' %}selected{% endif %}>Applied</option>
              <option value="interview" {% if form.status.value == 'interview' %}selected{% endif %}>Interview</option>
              <option value="offer" {% if form.status.value == 'offer' %}selected{% endif %}>Offer</option>
              <option value="rejected" {% if form.status.value == 'rejected' %}selected{% endif %}>Rejected</option>
            </select>
          </div>

          <div class="mb-4">
            <label class="form-label fw-semibold" style="font-size:14px">Notes <span class="text-muted fw-normal">(optional)</span></label>
            <textarea name="notes" rows="3"
              class="form-control rounded-3"
              placeholder="Any notes about this application..."
              style="padding: 10px 14px; font-size:14px">{{ form.notes.value|default:'' }}</textarea>
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-dark rounded-3 px-4" style="padding:10px">Save</button>
            <a href="{% url 'job_list' %}" class="btn btn-outline-secondary rounded-3 px-4" style="padding:10px">Cancel</a>
          </div>

        </form>
      </div>
    </div>
  </div>
</div>

{% endblock %}
