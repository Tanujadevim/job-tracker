{% extends 'jobs/base.html' %}
{% block content %}

<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm">
      <div class="card-body p-4 text-center">
        <h4 class="fw-bold mb-3">Delete Job?</h4>
        <p>Are you sure you want to delete <strong>{{ job.title }}</strong> at <strong>{{ job.company }}</strong>?</p>
        <form method="POST">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger me-2">Yes, Delete</button>
          <a href="{% url 'job_list' %}" class="btn btn-outline-secondary">Cancel</a>
        </form>
      </div>
    </div>
  </div>
</div>

{% endblock %}
